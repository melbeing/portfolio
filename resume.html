<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résumé — Mel Daniels</title>
  <meta name="description" content="Mel Daniels — UI/UX & Product Designer résumé.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;1,14..32,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('ms-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- ─── NAV ─── -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">Mel Daniels</a>
      <div class="nav__right">
        <ul class="nav__links">
          <li><a href="index.html"  class="nav__link">Design</a></li>
          <li><a href="crafts.html" class="nav__link">Crafts</a></li>
        </ul>
        <button class="theme-toggle" aria-label="Toggle light/dark mode">
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <main class="main">
      <div class="container">

        <div class="page-title-row reveal">
          <h1 class="page-title">Résumé</h1>
          <a href="Mel Daniels-resume.pdf" download class="btn btn--primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download PDF
          </a>
        </div>

        <div class="resume-frame reveal reveal-d1">
          <iframe
            src="Mel Daniels-resume.pdf"
            title="Mel Daniels Résumé"
            aria-label="Résumé document viewer">
          </iframe>
          <div class="resume-fallback">
            <p>Unable to display PDF inline. <a href="Mel Daniels-resume.pdf" style="color: var(--pine);">Open the PDF directly →</a></p>
          </div>
        </div>

      </div>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <span class="footer__copy">© 2026 Mel Daniels</span>
        <span class="footer__copy">Made with <span class="footer__pink">♡</span></span>
      </div>
    </footer>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
