<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected Work — Mel Daniels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;1,14..32,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      background: var(--bg);
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      text-align: center;
    }

    .login-lock {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--pine);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .login-lock svg {
      width: 20px;
      height: 20px;
      stroke: rgba(255,255,255,0.85);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      margin: 0 0 20px;
    }

    .login-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
      transition: border-color 0.18s ease;
    }
    .login-input:focus {
      border-color: var(--pine);
    }
    .login-input.error {
      border-color: #C0544A;
    }

    .login-error {
      font-size: 12px;
      color: #C0544A;
      margin-bottom: 8px;
      min-height: 16px;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--pine);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.18s ease;
    }
    .login-btn:hover { opacity: 0.88; }

    .login-back {
      display: block;
      margin-top: 8px;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 14px;
      text-align: center;
      text-decoration: none;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .login-back:hover {
      background: var(--bg-secondary);
      color: var(--text);
    }
  </style>
  <script>
    (function() {
      const t = localStorage.getItem('ms-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="login-card">
    <div class="login-lock">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <p class="login-title">Enter the password to view</p>

    <form method="POST" action="/.netlify/functions/auth" id="loginForm">
      <input type="hidden" name="redirect" id="redirectField" value="/">
      <input
        class="login-input"
        id="passwordInput"
        type="password"
        name="password"
        placeholder="Password"
        autocomplete="current-password"
        autofocus>
      <p class="login-error" id="errorMsg"></p>
      <button class="login-btn" type="submit">View Case Study</button>
    </form>

    <a href="/" class="login-back">Go Back</a>
  </div>

  <script>
    // Pull the redirect destination from the URL and populate the hidden field
    const params  = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '/';
    document.getElementById('redirectField').value = redirect;

    // Show error message if Netlify bounced back with ?error=1
    if (params.get('error')) {
      const input = document.getElementById('passwordInput');
      const error = document.getElementById('errorMsg');
      input.classList.add('error');
      error.textContent = 'Incorrect password. Try again.';
    }
  </script>
</body>
</html>
