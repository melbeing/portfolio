<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#F0EDE8"/>
  <!-- System architecture diagram -->
  <!-- Flow Box center -->
  <rect x="490" y="280" width="220" height="160" rx="20" fill="#243D2F"/>
  <text x="600" y="348" font-family="system-ui" font-size="14" font-weight="500" fill="white" text-anchor="middle">Flow Box</text>
  <text x="600" y="368" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Edge Orchestrator</text>
  <text x="600" y="386" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Raspberry Pi CM5 · On-premise</text>
  <text x="600" y="404" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">No cloud dependency</text>

  <!-- Device nodes -->
  <!-- Lights -->
  <rect x="80" y="100" width="140" height="80" rx="14" fill="white" stroke="#DDD9D2" stroke-width="1"/>
  <text x="150" y="133" font-family="system-ui" font-size="20" text-anchor="middle">💡</text>
  <text x="150" y="155" font-family="system-ui" font-size="11" fill="#1A1916" text-anchor="middle">Smart Lights</text>
  <text x="150" y="170" font-family="system-ui" font-size="9" fill="#6B6B65" text-anchor="middle">Zigbee · 12 devices</text>
  <line x1="220" y1="140" x2="490" y2="330" stroke="#243D2F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Shades -->
  <rect x="80" y="320" width="140" height="80" rx="14" fill="white" stroke="#DDD9D2" stroke-width="1"/>
  <text x="150" y="353" font-family="system-ui" font-size="20" text-anchor="middle">🪟</text>
  <text x="150" y="375" font-family="system-ui" font-size="11" fill="#1A1916" text-anchor="middle">Roller Shades</text>
  <text x="150" y="390" font-family="system-ui" font-size="9" fill="#6B6B65" text-anchor="middle">Matter · 8 devices</text>
  <line x1="220" y1="360" x2="490" y2="360" stroke="#243D2F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Thermostat -->
  <rect x="80" y="540" width="140" height="80" rx="14" fill="white" stroke="#DDD9D2" stroke-width="1"/>
  <text x="150" y="573" font-family="system-ui" font-size="20" text-anchor="middle">🌡</text>
  <text x="150" y="595" font-family="system-ui" font-size="11" fill="#1A1916" text-anchor="middle">Thermostat</text>
  <text x="150" y="610" font-family="system-ui" font-size="9" fill="#6B6B65" text-anchor="middle">Thread · 1 device</text>
  <line x1="220" y1="580" x2="490" y2="400" stroke="#243D2F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Audio -->
  <rect x="980" y="100" width="140" height="80" rx="14" fill="white" stroke="#DDD9D2" stroke-width="1"/>
  <text x="1050" y="133" font-family="system-ui" font-size="20" text-anchor="middle">🔊</text>
  <text x="1050" y="155" font-family="system-ui" font-size="11" fill="#1A1916" text-anchor="middle">Audio System</text>
  <text x="1050" y="170" font-family="system-ui" font-size="9" fill="#6B6B65" text-anchor="middle">Wi-Fi · 4 speakers</text>
  <line x1="980" y1="140" x2="710" y2="330" stroke="#243D2F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Mobile App -->
  <rect x="980" y="320" width="140" height="80" rx="14" fill="#243D2F"/>
  <text x="1050" y="353" font-family="system-ui" font-size="20" text-anchor="middle">📱</text>
  <text x="1050" y="375" font-family="system-ui" font-size="11" fill="white" text-anchor="middle">Mobile App</text>
  <text x="1050" y="390" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">mTLS · encrypted</text>
  <line x1="980" y1="360" x2="710" y2="360" stroke="#243D2F" stroke-width="2" opacity="0.7"/>

  <!-- Sensors -->
  <rect x="980" y="540" width="140" height="80" rx="14" fill="white" stroke="#DDD9D2" stroke-width="1"/>
  <text x="1050" y="573" font-family="system-ui" font-size="20" text-anchor="middle">📡</text>
  <text x="1050" y="595" font-family="system-ui" font-size="11" fill="#1A1916" text-anchor="middle">Sensors</text>
  <text x="1050" y="610" font-family="system-ui" font-size="9" fill="#6B6B65" text-anchor="middle">Zigbee · motion/temp</text>
  <line x1="980" y1="580" x2="710" y2="400" stroke="#243D2F" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Labels -->
  <text x="600" y="64" font-family="system-ui" font-size="18" font-weight="500" fill="#1A1916" text-anchor="middle">Connected Home Architecture</text>
  <text x="600" y="86" font-family="system-ui" font-size="12" fill="#6B6B65" text-anchor="middle">All orchestration runs on-premise · No cloud dependency for device control</text>
  <!-- Privacy badge -->
  <rect x="524" y="462" width="152" height="28" rx="8" fill="#E8F4EE"/>
  <text x="600" y="480" font-family="system-ui" font-size="10" fill="#243D2F" text-anchor="middle">🔒  Private keys never leave device</text>
</svg>
