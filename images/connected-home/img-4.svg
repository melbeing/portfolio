  <text x="660" y="488" font-family="system-ui" font-size="10" fill="#A8A8A0">● Outbound-only remote access (frp)</text>
  <text x="660" y="506" font-family="system-ui" font-size="10" fill="#A8A8A0">● No inbound firewall rules required</text>
  <text x="660" y="524" font-family="system-ui" font-size="10" fill="#A8A8A0">● On-chain audit trail (planned)</text>
  <rect x="660" y="548" width="160" height="28" rx="8" fill="#E8F4EE"/>
  <text x="740" y="566" font-family="system-ui" font-size="10" fill="#243D2F" text-anchor="middle">Zero cloud dependency</text>
