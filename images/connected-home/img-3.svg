<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#0F1210"/>
  <ellipse cx="600" cy="380" rx="500" ry="280" fill="rgba(36,61,47,0.2)"/>

  <!-- Three phones: onboarding flow -->
  <!-- Phone 1: Welcome / Setup -->
  <rect x="90" y="80" width="260" height="550" rx="32" fill="#111411" stroke="#1E2820" stroke-width="1.5"/>
  <rect x="103" y="98" width="234" height="514" rx="24" fill="#161B17"/>
  <text x="220" y="138" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle">Setup</text>
  <circle cx="220" cy="220" r="44" fill="#1A2D22"/>
  <text x="220" y="228" font-family="system-ui" font-size="28" text-anchor="middle">📦</text>
  <text x="220" y="290" font-family="system-ui" font-size="14" font-weight="500" fill="white" text-anchor="middle">Flow Box detected</text>
  <text x="220" y="310" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Unit 4811 · Flow Brickell</text>
  <!-- Progress dots -->
  <circle cx="200" cy="340" r="4" fill="#243D2F"/>
  <circle cx="220" cy="340" r="4" fill="#2D3B32"/>
  <circle cx="240" cy="340" r="4" fill="#2D3B32"/>
  <rect x="119" y="366" width="202" height="44" rx="12" fill="#243D2F"/>
  <text x="220" y="392" font-family="system-ui" font-size="12" fill="white" text-anchor="middle">Connect to my unit</text>
  <rect x="119" y="420" width="202" height="36" rx="10" fill="#1E2620" stroke="#2D3B32" stroke-width="1"/>
  <text x="220" y="442" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">Enter setup code</text>

  <!-- Phone 2: Discovering devices -->
  <rect x="470" y="40" width="260" height="630" rx="32" fill="#111411" stroke="#243D2F" stroke-width="2"/>
  <rect x="483" y="58" width="234" height="594" rx="24" fill="#161B17"/>
  <text x="600" y="100" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle">Discovering devices</text>
  <!-- Scanning animation suggestion -->
  <circle cx="600" cy="220" r="80" fill="none" stroke="#243D2F" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="220" r="56" fill="none" stroke="#243D2F" stroke-width="1" opacity="0.5"/>
  <circle cx="600" cy="220" r="32" fill="#1A2D22"/>
  <text x="600" y="228" font-family="system-ui" font-size="18" text-anchor="middle">📡</text>
  <!-- Found devices list -->
  <text x="499" y="336" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.25)">FOUND IN YOUR UNIT</text>
  <rect x="499" y="352" width="202" height="44" rx="10" fill="#1E2620"/>
  <text x="515" y="370" font-family="system-ui" font-size="11" fill="white">💡  Living Room Lights</text>
  <text x="515" y="386" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)">6 bulbs · Zigbee</text>
  <rect x="685" y="360" width="8" height="8" rx="4" fill="#4A9E6A"/>
  <rect x="499" y="406" width="202" height="44" rx="10" fill="#1E2620"/>
  <text x="515" y="424" font-family="system-ui" font-size="11" fill="white">🪟  Roller Shades</text>
  <text x="515" y="440" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)">4 motors · Matter</text>
  <rect x="685" y="414" width="8" height="8" rx="4" fill="#4A9E6A"/>
  <rect x="499" y="460" width="202" height="44" rx="10" fill="#1E2620"/>
  <text x="515" y="478" font-family="system-ui" font-size="11" fill="white">🌡  Nest Thermostat</text>
  <text x="515" y="494" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)">1 unit · Thread</text>
  <rect x="685" y="468" width="8" height="8" rx="4" fill="#EDB4C7"/>
  <text x="697" y="476" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.3)">pairing</text>
  <rect x="499" y="524" width="202" height="44" rx="12" fill="#243D2F"/>
  <text x="600" y="550" font-family="system-ui" font-size="12" fill="white" text-anchor="middle">Add all devices</text>

  <!-- Phone 3: Ready state -->
  <rect x="850" y="80" width="260" height="550" rx="32" fill="#111411" stroke="#1E2820" stroke-width="1.5"/>
  <rect x="863" y="98" width="234" height="514" rx="24" fill="#161B17"/>
  <text x="980" y="138" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle">All set</text>
  <circle cx="980" cy="210" r="44" fill="#243D2F"/>
  <text x="980" y="218" font-family="system-ui" font-size="28" text-anchor="middle">✓</text>
  <text x="980" y="282" font-family="system-ui" font-size="14" font-weight="500" fill="white" text-anchor="middle">Your home is connected</text>
  <text x="980" y="300" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">12 devices · fully private</text>
  <!-- Summary cards -->
  <rect x="879" y="328" width="90" height="70" rx="12" fill="#1E2620"/>
  <text x="924" y="356" font-family="system-ui" font-size="18" font-weight="300" fill="white" text-anchor="middle">12</text>
  <text x="924" y="374" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">devices</text>
  <rect x="979" y="328" width="90" height="70" rx="12" fill="#1A2D22"/>
  <text x="1024" y="356" font-family="system-ui" font-size="18" font-weight="300" fill="white" text-anchor="middle">5</text>
  <text x="1024" y="374" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Vibes ready</text>
  <rect x="879" y="414" width="190" height="44" rx="12" fill="#243D2F"/>
  <text x="974" y="440" font-family="system-ui" font-size="12" fill="white" text-anchor="middle">Start exploring</text>
</svg>
