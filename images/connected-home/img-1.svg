  <text x="970" y="233" font-family="system-ui" font-size="28" font-weight="200" fill="white" text-anchor="middle">60%</text>
  <text x="970" y="253" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Brightness</text>
