  <text x="653" y="288" font-family="system-ui" font-size="22" text-anchor="middle">🎯</text>
  <text x="653" y="310" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Focus</text>
  <rect x="499" y="352" width="96" height="84" rx="14" fill="#1E2620"/>
  <text x="547" y="384" font-family="system-ui" font-size="22" text-anchor="middle">🎉</text>
  <text x="547" y="406" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Party</text>
  <rect x="605" y="352" width="96" height="84" rx="14" fill="#1E2620"/>
  <text x="653" y="384" font-family="system-ui" font-size="22" text-anchor="middle">🎬</text>
  <text x="653" y="406" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Cinema</text>
