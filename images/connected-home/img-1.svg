  <rect x="877" y="342" width="24" height="24" rx="6" fill="#FFD580"/>
  <rect x="909" y="342" width="24" height="24" rx="6" fill="#FFE8B0"/>
  <rect x="941" y="342" width="24" height="24" rx="6" fill="#FFF4DC"/>
  <rect x="973" y="342" width="24" height="24" rx="6" fill="white"/>
  <rect x="1005" y="342" width="24" height="24" rx="6" fill="#C8E8FF"/>
  <rect x="1037" y="342" width="24" height="24" rx="6" fill="#A8D4FF"/>
